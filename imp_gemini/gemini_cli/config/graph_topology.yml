# AI SDLC â€” Default Graph Topology
# Version: 2.9.0 (Extended with Tournament Pattern)
# Reference: ADR-S-017 (Zoom Morphism), ADR-S-015 (Unit of Work)

asset_types:
  - name: intent
    description: "The spark of change (INT-*)"
  - name: requirements
    description: "Technology-agnostic WHAT"
  - name: feature_decomposition
    description: "Product-level breakdown into vectors (REQ-F-*)"
  - name: design
    description: "Technology-bound HOW (Architecture, ADRs)"
  - name: module_decomposition
    description: "Codebase-level breakdown into modules/packages"
  - name: basis_projections
    description: "Intersection of Feature x Module"
  - name: parallel_spawn
    description: "Fan-out point for multi-tenant or parallel exploration"
  - name: tournament_arbitration
    description: "Evaluation and selection among parallel candidates"
  - name: tournament_merge
    description: "Composite/cherry-picked asset construction"
  - name: code
    description: "Source code implementation"
  - name: unit_tests
    description: "Logic verification (Code-level)"
  - name: test_cases
    description: "Logic/Scenario validation (Design-level)"
  - name: uat_tests
    description: "User acceptance/Interface contract validation"
  - name: cicd
    description: "Build and deployment pipeline"
  - name: running_system
    description: "The operational artifact"
  - name: telemetry
    description: "Observability data (Metrics, Logs, Traces)"

transitions:
  - source: intent
    target: requirements
    name: "intentâ†’requirements"
    evaluators: ["agent", "human"]

  - source: requirements
    target: feature_decomposition
    name: "requirementsâ†’feature_decomp"
    evaluators: ["agent", "human"]

  - source: feature_decomposition
    target: design
    name: "feature_decompâ†’design"
    evaluators: ["agent", "human"]

  - source: design
    target: module_decomposition
    name: "designâ†’module_decomp"
    evaluators: ["agent", "human"]

  - source: module_decomposition
    target: basis_projections
    name: "module_decompâ†’basis_proj"
    evaluators: ["agent", "human"]

  # Standard Path
  - source: basis_projections
    target: code
    name: "basis_projâ†’code"
    evaluators: ["deterministic", "agent"]

  # Tournament Path (Enabled via profile or edge override)
  - source: basis_projections
    target: parallel_spawn
    name: "basis_projâ†’tournament_fanout"
    evaluators: ["agent_spawner"]

  - source: parallel_spawn
    target: tournament_arbitration
    name: "spawnâ†’arbitration"
    evaluators: ["agent", "human"]

  - source: tournament_arbitration
    target: tournament_merge
    name: "arbitrationâ†’merge"
    evaluators: ["agent", "human"]

  - source: tournament_merge
    target: code
    name: "mergeâ†’code"
    evaluators: ["deterministic"]

  - source: code
    target: unit_tests
    name: "codeâ†”unit_tests"
    evaluators: ["deterministic", "agent"]

  - source: design
    target: test_cases
    name: "designâ†’test_cases"
    evaluators: ["agent"]

  - source: module_decomposition
    target: uat_tests
    name: "module_decompâ†’uat_tests"
    evaluators: ["agent", "human"]

  - source: code
    target: cicd
    name: "codeâ†’cicd"
    evaluators: ["deterministic"]

  - source: cicd
    target: running_system
    name: "cicdâ†’running_system"
    evaluators: ["deterministic"]

  - source: running_system
    target: telemetry
    name: "running_systemâ†’telemetry"
    evaluators: ["deterministic"]

  - source: telemetry
    target: intent
    name: "telemetryâ†’intent"
    evaluators: ["agent", "human"]

graph_properties:
  directed: true
  cyclic: true
  extensible: true
  zoomable: true
  version: "2.9.0"
