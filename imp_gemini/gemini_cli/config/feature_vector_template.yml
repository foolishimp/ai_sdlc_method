# Unified Intent Vector Template (ADR-S-026)
# Scaffolded by /gen-iterate on first iteration for a vector
#
# This template collapses feature, discovery, spike, poc, and hotfix vectors
# into a single unified construct parameterised by resolution_level and 
# composition_expression.

id: "INTENT-{DOMAIN}-{SEQ}"
source: "abiogenesis"                # abiogenesis | gap | parent_vector
parent_vector_id: ""                  # parent vector ID (empty if root)
resolution_level: "intent"            # intent | requirements | design | code | deployment | telemetry
vector_type: "feature"                # feature | discovery | spike | poc | hotfix
profile: "standard"                   # projection profile: full | standard | poc | spike | hotfix | minimal
status: "pending"                     # pending | iterating | converged | blocked | time_box_expired
created_at: "{timestamp}"
updated_at: "{timestamp}"

# ═══════════════════════════════════════════════════════════════════════
# COMPOSITION EXPRESSION (§ADR-S-026)
# ═══════════════════════════════════════════════════════════════════════
# The DNA of the vector — determines what it produces and how it converges.

composition_expression:
  macro: "PLAN"                       # PLAN | SCHEMA_DISCOVERY | POC | BUILD | ...
  bindings:
    unit_category: "feature"
    evaluation_criteria: "mvp_value"
    time_box: null

# ═══════════════════════════════════════════════════════════════════════
# TRAJECTORY
# ═══════════════════════════════════════════════════════════════════════
# Asset states along this vector's path through the graph.

trajectory:
  intent:
    status: converged
    asset: "specification/INTENT.md"
  
  requirements:
    status: pending
    # started_at: ""
    # converged_at: ""
    # asset: ""
    # evaluator_results: {}

  design:
    status: pending

  code:
    status: pending

# ═══════════════════════════════════════════════════════════════════════
# PARENT / CHILD RELATIONSHIPS
# ═══════════════════════════════════════════════════════════════════════

children: []
  # - id: "INTENT-SPIKE-001"
  #   status: converged

# ═══════════════════════════════════════════════════════════════════════
# CONSTRAINTS (Vector-Specific)
# ═══════════════════════════════════════════════════════════════════════

constraints:
  acceptance_criteria: []
  threshold_overrides: {}
  additional_checks: []
