# AI SDLC — Default Graph Topology
# Implements: REQ-GRAPH-001, REQ-GRAPH-002, REQ-GRAPH-003, REQ-LIFE-001, REQ-LIFE-002
# Version: 2.9.0
# Reference: AI_SDLC_ASSET_GRAPH_MODEL.md (v2.9.0)
#
# This file defines the asset types and admissible transitions for the
# default SDLC graph. Projects can extend or modify this topology.
# The graph topology is itself an element of Context[].

---

# ═══════════════════════════════════════════
# Asset Type Registry
# ═══════════════════════════════════════════
#
# Each asset type defines:
#   schema:          what fields the asset has
#   markov_criteria: conditions for promotion (candidate → stable)

asset_types:

  intent:
    description: "Raw problem/opportunity statement that spawns development work"
    schema:
      id: "INT-{SEQ}"
      description: string
      source: enum[human, runtime_feedback, ecosystem]
      priority: enum[critical, high, medium, low]
      spawns_features: list
    markov_criteria:
      - has_id
      - has_description
      - has_source

  requirements:
    description: "Structured, testable requirements with unique immutable keys"
    schema:
      id: "REQ-{TYPE}-{DOMAIN}-{SEQ}"
      type: enum[F, NFR, DATA, BR]
      description: string
      acceptance_criteria: list
      priority: enum[critical, high, medium]
      traces_to: "INT-*"
    markov_criteria:
      - has_id
      - has_type
      - has_acceptance_criteria
      - traces_to_intent
      - human_approved

  feature_decomposition:
    description: "Tech-agnostic decomposition of requirements into dependency-ordered buildable features"
    schema:
      features: list               # Each feature: id (REQ-F-*), name, satisfies (list of REQ keys)
      dependency_dag: object       # Adjacency list: feature_id → [feature_ids that must converge first]
      build_order: list            # Topological sort of dependency_dag
      mvp_scope: list              # Feature IDs in MVP (connected subgraph)
      deferred_scope: list         # Feature IDs explicitly deferred past MVP
    markov_criteria:
      - all_req_f_keys_assigned    # Every REQ-F-* key is in exactly one feature
      - dag_is_acyclic             # No circular feature dependencies
      - build_order_derivable      # Topological sort succeeds
      - mvp_scope_marked           # MVP/deferred boundary explicitly stated
      - human_approved

  design_recommendations:
    description: |
      Synthesis of feature priorities and dependencies into ordered design directives.
      Produced from feature_decomposition (dependency DAG + MVP scope) before architectural
      design begins. Answers: what to design first, what cross-cutting concerns the feature
      set implies, which ADR areas must be resolved before detailed design proceeds.
      Complexity management: makes the feature→design pruning explicit rather than implicit.
    schema:
      design_order: list       # Ordered list of feature groups to design, derived from dependency DAG + MVP priority
      cross_cutting: list      # Concerns that span multiple features (auth, observability, error handling, etc.)
      adr_areas: list          # ADR decisions that must be made before component design (ecosystem, security, etc.)
      deferred: list           # Features explicitly deferred — design should not design for them yet
      constraints_from_features: object  # Constraints implied by the feature set (e.g. "3 features need async — event bus likely")
    markov_criteria:
      - all_mvp_features_ordered   # Every MVP feature appears in design_order
      - cross_cutting_identified   # At least one cross-cutting concern listed (or explicit "none")
      - adr_areas_named            # ADR areas named (even if "TBD — decide during design")
      - human_approved

  module_decomposition:
    description: "Mapping of architectural components to code modules; dependency DAG; interface contracts; feature×module n-n mapping"
    schema:
      module_map: object         # component_name → module_path(s)
      feature_module_map: object # feature_id → [module_paths] — the n-n mapping (many features × many modules)
      dependency_dag: object     # module → [modules it depends on] — must be acyclic
      construction_order: list   # Topological sort of dependency_dag, tie-broken by derived feature priority
      interface_contracts: list  # Public APIs between modules (F_D-verifiable)
      build_config: object       # Build system scaffolding (package.json, setup.py, etc.)
    markov_criteria:
      - all_components_mapped      # Every design component → at least one module
      - feature_module_map_present # Every MVP feature mapped to its implementing modules
      - dependency_dag_acyclic     # No circular module dependencies
      - construction_order_derived # construction_order = topo_sort(dag, feature_priority propagation)
      - interfaces_defined         # All inter-module calls have contracts
      - human_approved

  basis_projections:
    description: "Per-(feature × module) intersection specs — each projection scopes one feature within one module"
    schema:
      projections: list        # Each: {feature_id, module_id, scope, out_of_scope, required_interfaces, exposed_interfaces, evaluator_contract}
    markov_criteria:
      - all_features_projected  # Every MVP feature projected onto its modules
      - projections_sum_to_feature  # Sum of projections for F = intent of F
      - module_interfaces_consistent  # All projections for a module agree with module interface

  design:
    description: "Technical solution architecture with component specs and ADRs"
    schema:
      components: list
      adrs: list
      data_models: list
      api_specs: list
      dependencies: list
    markov_criteria:
      - has_components
      - traces_to_feature_decomposition
      - adrs_documented
      - human_approved

  code:
    description: "Implementation source code tagged with REQ keys"
    schema:
      files: list
      language: string
      req_tags: list
      # Tag format: "Implements: REQ-*" (comment syntax is language-specific)
    markov_criteria:
      - compiles
      - has_req_tags
      - style_compliant

  unit_tests:
    description: "Unit tests co-evolved with code via TDD"
    schema:
      files: list
      coverage: float
      req_tags: list
      # Tag format: "Validates: REQ-*"
    markov_criteria:
      - all_pass
      - coverage_above_threshold
      - has_req_tags

  test_cases:
    description: "Integration/system test cases derived from design"
    schema:
      files: list
      format: enum[gherkin, pytest, jest]
      req_tags: list
    markov_criteria:
      - all_pass
      - has_req_tags
      - traces_to_requirements

  uat_tests:
    description: "Business acceptance tests in pure business language (BDD)"
    schema:
      scenarios: list
      format: gherkin
      language: business
      req_tags: list
    markov_criteria:
      - all_pass
      - business_language
      - has_req_tags
      - human_approved

  cicd:
    description: "CI/CD pipeline configuration and artifacts"
    schema:
      pipeline: string
      artifacts: list
      release_manifest: object
    markov_criteria:
      - build_passes
      - deploy_succeeds

  running_system:
    description: "Deployed and running system with health checks"
    schema:
      endpoints: list
      health: object
      slas: list
    markov_criteria:
      - healthy
      - within_sla

  telemetry:
    description: "Runtime metrics and alerts tagged with REQ keys"
    schema:
      metrics: list
      alerts: list
      req_tags: list
    markov_criteria:
      - collecting
      - tagged_with_req_keys

# ═══════════════════════════════════════════
# Constraint Dimensions (Spec §2.6.1)
# ═══════════════════════════════════════════
#
# Constraint dimensions are categories of disambiguation that design must
# resolve at the Requirements → Design edge. Each unresolved mandatory
# dimension leaves the design under-constrained — the constructor fills
# the gap with implicit assumptions that may be wrong.
#
# These dimensions are SDLC-specific (graph package configuration).
# Different domains have different dimension taxonomies.
#
# mandatory: must be explicitly resolved via ADR or design decision
# advisory:  should be considered, may use implementation defaults
#
# Project bindings provide concrete values for each dimension in
# project_constraints.yml under the `constraint_dimensions:` key.

constraint_dimensions:

  ecosystem_compatibility:
    description: "Runtime platform, language version, framework versions, dependency compatibility"
    mandatory: true
    resolves_via: adr
    examples:
      - "Scala 2.13 + Spark 3.5 (not Scala 3 — incompatible)"
      - "Python 3.12 + Django 5.0"
      - "Node 20 + React 18 + Next.js 14"

  deployment_target:
    description: "Where and how the system runs, infrastructure assumptions"
    mandatory: true
    resolves_via: adr
    examples:
      - "Kubernetes on AWS EKS"
      - "Serverless (Lambda + API Gateway)"
      - "On-premise Docker Compose"

  security_model:
    description: "Authentication, authorisation, data protection, threat model"
    mandatory: true
    resolves_via: adr
    examples:
      - "OAuth2 + RBAC, mTLS between services"
      - "API key + rate limiting"
      - "JWT + row-level security"

  data_governance:
    description: "Privacy, lineage, retention, compliance frameworks"
    mandatory: false
    resolves_via: adr_or_design_section
    examples:
      - "GDPR compliant, data classification, 7-year retention"
      - "SOC2 audit trail required"

  performance_envelope:
    description: "Latency, throughput, resource bounds, scaling strategy"
    mandatory: false
    resolves_via: design_section
    examples:
      - "p99 < 200ms, 10k RPS, horizontal scaling"
      - "Batch processing: 1M records/hour"

  build_system:
    description: "Build tool, module structure, dependency management, CI integration"
    mandatory: true
    resolves_via: adr_or_design_section
    examples:
      - "sbt multi-module with dependency DAG"
      - "npm workspaces monorepo"
      - "Gradle with convention plugins"

  observability:
    description: "Logging, metrics, tracing, alerting strategy"
    mandatory: false
    resolves_via: design_section
    examples:
      - "OpenTelemetry, structured JSON logging, REQ-key tagging"
      - "Prometheus + Grafana, ELK stack"

  error_handling:
    description: "Failure modes, retry strategy, circuit breaking, degradation"
    mandatory: false
    resolves_via: design_section
    examples:
      - "Fail-fast with structured error types"
      - "Retry with exponential backoff, circuit breaker on external calls"

# ═══════════════════════════════════════════
# Admissible Transitions
# ═══════════════════════════════════════════
#
# Each transition defines:
#   source/target: asset types
#   edge_type:     co_evolution (bidirectional) or standard (directional)
#   evaluators:    which evaluator types check convergence
#   constructor:   who produces the next candidate
#   edge_config:   path to edge parameterisation file (optional)
#                  In plugin source: relative to config/ (includes edge_params/ prefix)
#                  In workspace: /gen-init strips the prefix — paths are relative
#                  to .ai-workspace/graph/edges/

transitions:

  - name: "Intent → Requirements"
    source: intent
    target: requirements
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/intent_requirements.yml"

  - name: "Requirements → Feature Decomposition"
    source: requirements
    target: feature_decomposition
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/requirements_feature_decomp.yml"

  - name: "Feature Decomposition → Design Recommendations"
    source: feature_decomposition
    target: design_recommendations
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/feature_decomp_design_rec.yml"
    note: |
      Synthesises feature priorities + dependency DAG into ordered design directives.
      Makes the feature→design pruning explicit: what to design first, what cross-cutting
      concerns exist, which ADR areas must be resolved before component design begins.
      Zoom-out profiles (poc, spike) skip this and go feature_decomposition → design directly.

  - name: "Design Recommendations → Design"
    source: design_recommendations
    target: design
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/requirements_design.yml"
    note: |
      Design constrained by design_recommendations: must cover features in recommended order,
      must resolve all named ADR areas, must address cross-cutting concerns.
      Reuses requirements_design.yml edge config — adds design_recommendations as required context.

  - name: "Requirements → Design"
    source: requirements
    target: design
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/requirements_design.yml"
    note: |
      Zoom-out shortcut for poc/spike/hotfix profiles. Skips feature_decomposition and
      design_recommendations entirely — the constructor handles the full leap internally.
      Standard/full profiles do NOT use this edge — they route through the decomposition
      chain. Different profiles, different paths. Not ambiguity — zoom.

  - name: "Design → Module Decomposition"
    source: design
    target: module_decomposition
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/design_module_decomp.yml"
    note: "PoC/spike profiles skip this — Design → Code directly (zoom)"

  - name: "Module Decomposition → Basis Projections"
    source: module_decomposition
    target: basis_projections
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/module_decomp_basis_proj.yml"

  - name: "Basis Projections → Code"
    source: basis_projections
    target: code
    edge_type: standard
    evaluators: [agent, deterministic]
    constructor: agent
    edge_config: "edge_params/design_code.yml"
    note: "Reuses design_code edge params; the basis projection replaces design as the source context"

  - name: "Design → Code"
    source: design
    target: code
    edge_type: standard
    evaluators: [agent, deterministic]
    constructor: agent
    edge_config: "edge_params/design_code.yml"
    note: "PoC/spike shortcut — standard profile uses Design → Module Decomp → Basis Proj → Code"

  - name: "Code ↔ Unit Tests"
    source: code
    target: unit_tests
    edge_type: co_evolution
    evaluators: [agent, deterministic]
    constructor: agent
    edge_config: "edge_params/tdd.yml"

  - name: "Design → Test Cases"
    source: design
    target: test_cases
    edge_type: standard
    evaluators: [agent, deterministic]
    constructor: agent
    edge_config: "edge_params/design_tests.yml"

  - name: "Design → UAT Tests"
    source: design
    target: uat_tests
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/bdd.yml"

  - name: "Code → CI/CD"
    source: code
    target: cicd
    edge_type: standard
    evaluators: [deterministic]
    constructor: deterministic

  - name: "CI/CD → Running System"
    source: cicd
    target: running_system
    edge_type: standard
    evaluators: [deterministic]
    constructor: deterministic

  - name: "Running System → Telemetry"
    source: running_system
    target: telemetry
    edge_type: standard
    evaluators: [deterministic]
    constructor: deterministic

  - name: "Telemetry → Intent (Feedback Loop)"
    source: telemetry
    target: intent
    edge_type: standard
    evaluators: [agent, human]
    constructor: agent
    edge_config: "edge_params/feedback_loop.yml"

# ═══════════════════════════════════════════
# Graph Properties
# ═══════════════════════════════════════════

graph_properties:
  directed: true
  cyclic: true         # Feedback loop: telemetry → intent
  extensible: true     # Add new asset types/transitions via YAML
  zoomable: true       # Any edge can expand into a sub-graph
  version: "2.9.0"
