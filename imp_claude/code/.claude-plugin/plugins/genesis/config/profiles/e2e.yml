# Projection Profile: E2E Headless Test
# Purpose: CI/headless e2e runs ‚Äî no human gates, simplified graph.
#
# Differences from standard:
#  - Simplified graph: requirements‚Üídesign directly (no feature_decomp chain)
#  - All evaluators: [agent] or [agent, deterministic] ‚Äî zero human gates
#  - route/decide encoded as F_P (not F_H) for autonomous operation
#  - escalation: agent (not human)

---

profile: e2e
description: "E2E headless test ‚Äî simplified graph, agent-only evaluators, no human gates"
version: "1.0.0"

# Graph: 4-edge simplified path
# Skips intermediate decomposition steps (feature_decomp, design_rec,
# module_decomp, basis_proj) that require human review.
graph:
  include:
    - "intent‚Üírequirements"
    - "requirements‚Üídesign"     # direct ‚Äî no feature_decomp or design_rec
    - "design‚Üícode"
    - "code‚Üîunit_tests"
  optional:
    - "design‚Üíuat_tests"
  skip:
    - "requirements‚Üífeature_decomposition"
    - "feature_decomposition‚Üídesign_recommendations"
    - "design_recommendations‚Üídesign"
    - "design‚Üímodule_decomposition"
    - "module_decomposition‚Üíbasis_projections"
    - "basis_projections‚Üícode"
    - "code‚Üícicd"
    - "telemetry‚Üíintent"

# Evaluators: agent + deterministic only ‚Äî no human gates
evaluators:
  default: [agent, deterministic]
  overrides:
    "intent‚Üírequirements":
      evaluators: [agent]           # no human completeness/priority gates
    "requirements‚Üídesign":
      evaluators: [agent]           # no human architectural review
    "design‚Üícode":
      evaluators: [agent, deterministic]
    "code‚Üîunit_tests":
      evaluators: [agent, deterministic]
    "design‚Üíuat_tests":
      evaluators: [agent]           # no human language/coverage approval

# Convergence: all required non-human checks pass
convergence:
  rule: "all_required_checks_pass"
  human_required_on_all_edges: false
  threshold_strictness: standard

# Context: minimal load for speed
context:
  density: standard
  required_elements:
    - project_constraints
    - graph_topology
  optional_elements:
    - adrs

# Encoding: F_P for route/decide (no F_H ‚Äî autonomous operation)
encoding:
  strategy: balanced
  mode: interactive
  valence: medium
  functional_units:
    evaluate:    F_D
    construct:   F_P
    classify:    F_D
    route:       F_P              # F_P not F_H ‚Äî autonomous routing
    propose:     F_P
    sense:       F_D
    emit:        F_D              # category-fixed
    decide:      F_P              # F_P not F_H ‚Äî autonomous decisions
  edge_overrides: {}

# Iteration budget
iteration:
  budget: per_sprint
  timeout: none
  escalation: agent               # escalate to agent, not human

# Vector types permitted
vector_types: [feature, discovery, spike, hotfix, poc]
