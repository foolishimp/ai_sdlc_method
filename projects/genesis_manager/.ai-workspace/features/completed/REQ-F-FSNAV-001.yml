# ── Intent ────────────────────────────────────────────────────────────────────
# Genesis manager currently requires the user to type an absolute path to register
# a workspace. Both genesis_monitor and the codex navigator solved this with a
# filesystem browser that auto-detects .ai-workspace directories. We need the same:
#   - Browse the local filesystem up and down from the current directory
#   - Visually distinguish folders that contain .ai-workspace/ (= Genesis workspaces)
#   - One-click register without typing paths

# ── Requirements (draft — iterating) ─────────────────────────────────────────
# REQ-F-FSNAV-001  Server exposes a browse API: GET /api/fs/browse?path=<dir>
#   Returns: { path, parent, entries: [{name, isDir, hasWorkspace, absolutePath}] }
#   hasWorkspace = true iff entry contains a .ai-workspace/events/events.jsonl
#
# REQ-F-FSNAV-002  UI: FolderBrowser component
#   - Shows current path as breadcrumb
#   - Lists subdirectories; workspace-containing dirs are highlighted
#   - Navigate into a subdir (click) or up (breadcrumb / ".." entry)
#   - "Add workspace" action available on any highlighted workspace dir
#
# REQ-F-FSNAV-003  Integration: FolderBrowser replaces or supplements the
#   current text-input in WorkspaceConfigDrawer. When a workspace dir is
#   selected the path is pre-filled and POST /api/workspaces fires automatically.

# ── Acceptance Criteria ───────────────────────────────────────────────────────
# AC-1  GET /api/fs/browse?path=/some/dir returns entries for all subdirectories
#       in /some/dir. Entry.hasWorkspace = true iff .ai-workspace/events/events.jsonl
#       is accessible. Responds in < 500ms for directories with ≤ 500 entries.
# AC-2  GET /api/fs/browse (no path) defaults to the server process CWD.
# AC-3  GET /api/fs/browse?path=.. traverses to the parent directory correctly.
# AC-4  FolderBrowser renders: breadcrumb path, subdirectory list, workspace badge.
# AC-5  Clicking a non-workspace dir navigates into it (updates displayed path).
# AC-6  Clicking a workspace-badged dir triggers registration and closes the drawer.
# AC-7  Breadcrumb segments are clickable and navigate to that ancestor.
# AC-8  Hidden directories (name starts with '.') are excluded unless the dir
#       itself is .ai-workspace (never shown — it's the target, not a navigable dir).

