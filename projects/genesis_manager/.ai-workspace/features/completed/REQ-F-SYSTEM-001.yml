      check: "REQ-F-NAV-001 through REQ-F-NAV-005 present and cover REQ keys, feature IDs, run IDs, events, canonical pages"
      req: "REQ-F-SYSTEM-001"
      required: true

    - id: "AC-SYS-003"
      description: "Human approves requirements scope and completeness"
      evaluator: human
      check: "Human explicitly approves requirements document at specification/requirements/REQUIREMENTS.md"
      req: "REQ-F-SYSTEM-001"
      required: true

    - id: "AC-SYS-004"
      description: "Human approves requirements priority assignments"
      evaluator: human
      check: "Human confirms critical/high/medium priority assignments are correct"
      req: "REQ-F-SYSTEM-001"
      required: true

