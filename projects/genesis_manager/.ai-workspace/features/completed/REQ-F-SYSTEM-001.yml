    - id: "AC-SYS-005"
      description: "Feature decomposition covers all REQ-F-* keys (F_D coverage check)"
      evaluator: deterministic
      check: "Every REQ-F-* key in REQUIREMENTS.md appears in satisfies: field of at least one feature vector"
      req: "REQ-F-SYSTEM-001"
      required: true

    - id: "AC-SYS-006"
      description: "Human approves feature decomposition, dependency ordering, and MVP boundary"
      evaluator: human
      check: "Human explicitly approves feature decomposition and MVP scope"
      req: "REQ-F-SYSTEM-001"
      required: true

    # ─── Critical REQ key bindings ────────────────────────────────────────
    - id: "AC-SYS-007"
      description: "Human gate queue is complete and actionable in-UI (REQ-F-SUP-002)"
      evaluator: human
      check: "Human confirms supervision work area shows all pending gates with approve/reject actions"
      req: "REQ-F-SUP-002"
      required: true

    - id: "AC-SYS-008"
      description: "All navigation handles resolve — no dead links (REQ-NFR-ACC-001)"
