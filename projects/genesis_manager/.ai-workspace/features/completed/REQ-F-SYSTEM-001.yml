    # ─── Requirements edge ACs ────────────────────────────────────────────
    - id: "AC-SYS-001"
      description: "Requirements cover all 6 work areas: Projects, Overview, Supervision, Evidence, Control, Release"
      evaluator: agent
      check: "Each work area from INTENT.md has at least one REQ-F-* key in REQUIREMENTS.md"
      req: "REQ-F-SYSTEM-001"
      required: true

    - id: "AC-SYS-002"
      description: "Navigation invariant captured — every technical identifier is a navigation handle"
