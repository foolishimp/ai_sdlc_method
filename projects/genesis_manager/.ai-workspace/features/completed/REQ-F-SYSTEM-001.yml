# genesis_manager is a builder supervision console.
# Requirements edge: produce a complete requirements document with REQ-F-* keys
#   covering all 6 work areas from the intent.
# Feature decomposition edge: decompose REQ keys into domain feature vectors
#   (PROJ, OVR, SUP, EVI, CTL, REL, NAV, UX domains).

