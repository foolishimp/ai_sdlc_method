# Projection Profile: Standard
# Reference: PROJECTIONS_AND_INVARIANTS.md Â§7.1
#
# Normal feature development â€” team with CI/CD.
# Core edges active, human review on key transitions, agent + deterministic elsewhere.

---

profile: standard
description: "Normal feature development â€” full decomposition chain, team with CI/CD"
version: "1.1.0"

# Graph: full decomposition chain
# Each intermediate node manages constructor complexity and makes pruning visible.
# Zoom note: poc/spike profiles collapse this â€” they skip decomposition entirely
# (requirementsâ†’design directly). There is no "requirementsâ†’design" shortcut
# in standard â€” if complexity warrants a standard profile, it warrants explicit
# decomposition. That is the point.
graph:
  include:
    - "intentâ†’requirements"
    - "requirementsâ†’feature_decomposition"
    - "feature_decompositionâ†’design_recommendations"
    - "design_recommendationsâ†’design"
    - "designâ†’module_decomposition"
    - "module_decompositionâ†’basis_projections"
    - "basis_projectionsâ†’code"
    - "codeâ†”unit_tests"
  optional:
    - "designâ†’test_cases"
    - "designâ†’uat_tests"
    - "codeâ†’cicd"

# Evaluators: agent + deterministic on most, human on key edges
evaluators:
  default: [agent, deterministic]
  overrides:
    "intentâ†’requirements":
      evaluators: [agent, human]
    "requirementsâ†’feature_decomposition":
      evaluators: [agent, human]
    "feature_decompositionâ†’design_recommendations":
      evaluators: [agent, human]
    "design_recommendationsâ†’design":
      evaluators: [agent, human]
    "designâ†’module_decomposition":
      evaluators: [agent, human]
    "designâ†’uat_tests":
      evaluators: [agent, human]

# Convergence: all required checks pass
convergence:
  rule: "all_required_checks_pass"
  human_required_on_all_edges: false
  threshold_strictness: standard

# Context: project constraints + relevant ADRs
context:
  density: standard
  required_elements:
    - project_constraints
    - adrs
    - graph_topology
  optional_elements:
    - data_models
    - templates
    - policy

# Encoding: functor encoding per Â§2.9
encoding:
  strategy: balanced
  mode: interactive
  valence: medium
  functional_units:
    evaluate:    F_D
    construct:   F_P
    classify:    F_D
    route:       F_H
    propose:     F_P
    sense:       F_D
    emit:        F_D                 # category-fixed
    decide:      F_H                 # category-fixed
  edge_overrides: {}

# Iteration budget
iteration:
  budget: per_sprint    # bounded by sprint cadence
  timeout: none         # no hard time box (sprint boundary is soft)
  escalation: human

# Vector types permitted
vector_types: [feature, discovery, spike, hotfix]
