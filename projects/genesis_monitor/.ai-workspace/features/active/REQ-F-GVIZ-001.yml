feature: REQ-F-GVIZ-001
title: "Event Trail Graph — D3.js Interactive Visualization"
intent: INT-GMON-010
vector_type: feature
profile: standard
status: converged
created: '2026-03-08T00:00:00Z'
updated: '2026-03-08T01:00:00Z'
depends_on:
- REQ-F-GMON-001          # project discovery (has events)
- REQ-F-ELIN-001          # EventIndex (has EdgeRun data)

description: >
  Render the methodology asset graph as an interactive "event trail" — nodes are asset types,
  arcs are EdgeRuns. Arc weight encodes iteration effort (logarithmic stroke width). Arc style
  encodes status (solid/dashed/dotted). Arc colour encodes feature identity (Tableau-10 palette).
  Arc opacity encodes recency. Nodes encode aggregate health (size + fill colour + pulse animation).
  A legend maps features to colours with toggle controls. Selecting an arc or node filters the
  timeline table below. D3.js v7 from CDN renders the SVG; a new JSON endpoint provides the data.

requirements:
- REQ-F-GVIZ-001  # Topology node layout
- REQ-F-GVIZ-002  # EdgeRun arc rendering (trail)
- REQ-F-GVIZ-003  # Interactive selection and table synchronisation
- REQ-F-GVIZ-004  # Effort and health encoding at node level
- REQ-F-GVIZ-005  # Feature legend and colour identity

