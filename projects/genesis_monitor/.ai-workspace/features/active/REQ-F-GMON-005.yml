description: >
  Extend the workspace scanner from single-level .ai-workspace/ discovery to recursive
  traversal of nested workspaces (CQRS model per §7.4.4 of the Asset Graph Model).
  Parent project view shows own events plus an option to include child workspace events.
  Child workspaces are listed with event counts and links to their own project view.
  Parent view aggregates REQ key coverage across all child workspaces.

