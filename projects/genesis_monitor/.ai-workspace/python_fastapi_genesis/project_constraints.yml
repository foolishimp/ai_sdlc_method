design_name: python_fastapi_genesis

project:
  name: genesis-monitor
  version: 0.1.0

language:
  primary: python
  version: ">=3.11"

tools:
  test_runner:
    command: "python -m pytest"
    args: "imp_python_fastapi/tests/ -q"
    pass_criterion: "exit code 0"
    required: true
  linter:
    command: "ruff check"
    args: "imp_python_fastapi/code/src/ imp_python_fastapi/tests/ --ignore=E501,E701,F821,F841"
    pass_criterion: "exit code 0"
    required: false

thresholds:
  test_coverage_minimum: "80%"

standards:
  type_hints: required
  test_structure: AAA

architecture:
  patterns:
    - parser-model-projection
    - server-sent-events
    - server-rendered-html
  dependency_rules:
    - parsers must not import server
    - projections must not import server
    - models must not import anything from genesis_monitor
  forbidden_practices:
    - writing to monitored workspace directories
    - client-side state management
    - JavaScript build tooling