{% if backing_docs %}
{% for doc in backing_docs %}
<details style="margin-bottom: 0.75rem;" {% if loop.first %}open{% endif %}>
    <summary style="cursor:pointer; font-size:0.9rem; user-select:none; display:flex; justify-content:space-between; align-items:center;">
        <span><strong>{{ doc.title }}</strong></span>
        <code style="font-size:0.75em; opacity:0.6; font-weight:normal;">{{ doc.path }}</code>
    </summary>
    <div style="margin-top: 0.5rem;">
        <pre style="max-height: 400px; overflow-y: auto; overflow-x: auto;
                    background: var(--pico-card-background-color);
                    border: 1px solid var(--pico-muted-border-color); border-radius: 6px;
                    padding: 1rem; font-size: 0.8rem; line-height: 1.6; margin: 0;
                    white-space: pre-wrap; word-break: break-word;"><code>{{ doc.content | e }}</code></pre>
    </div>
</details>
{% endfor %}
<p style="font-size:0.75em; color:var(--pico-muted-color);">{{ backing_docs | length }} document{% if backing_docs | length != 1 %}s{% endif %} shown (capped at 9, content at 8 KB each)</p>
{% else %}
<p style="color:var(--pico-muted-color); font-size:0.9rem;"><em>No backing documents found.</em></p>
{% endif %}
