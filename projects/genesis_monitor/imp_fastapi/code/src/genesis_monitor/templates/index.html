{% extends "base.html" %}
{% block title %}Genesis Monitor — Projects{% endblock %}

{% block content %}
<h1>Monitored Projects <small style="font-size:0.6em; color: var(--pico-muted-color);">{{ projects | length }} projects</small></h1>

<div id="project-tree"
     hx-get="/fragments/tree"
     hx-trigger="sse:project_updated, sse:project_added, sse:project_removed"
     hx-swap="innerHTML">
    {% include "fragments/_tree.html" %}
</div>
{% endblock %}
