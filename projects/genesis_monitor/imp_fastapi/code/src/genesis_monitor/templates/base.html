<!-- Implements: REQ-F-NAV-005, REQ-F-NAV-006, REQ-F-NAV-007 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Genesis Monitor{% endblock %}</title>

    <!-- Pico CSS — classless, minimal -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <!-- HTMX + SSE extension -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>

    {% block head_extra %}{% endblock %}

    <style>
        :root {
            --pico-font-size: 15px;
        }
        nav { margin-bottom: 1rem; }
        .status-converged { color: #4caf50; font-weight: bold; }
        .status-in_progress, .status-in-progress { color: #ff9800; font-weight: bold; }
        .status-not_started, .status-not-started { color: #999; }
        .card { border: 1px solid var(--pico-muted-border-color); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .event-feed { max-height: 300px; overflow-y: auto; font-size: 0.85rem; }
        .mermaid { text-align: center; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
        .badge-converged { background: rgba(76, 175, 80, 0.15); color: #4caf50; }
        .badge-in-progress { background: rgba(255, 152, 0, 0.15); color: #ff9800; }
        .badge-not-started { background: rgba(153, 153, 153, 0.15); color: #999; }

        /* v2.9 Formal Transactions */
        .human-tag { color: #2196f3; background: rgba(33, 150, 243, 0.1); padding: 2px 4px; border-radius: 3px; }
        .error-tag { color: #f44336; background: rgba(244, 67, 54, 0.1); padding: 2px 4px; border-radius: 3px; }
        .hash-box { display: inline-block; padding: 1px 4px; background: #eee; border: 1px solid #ddd; border-radius: 3px; font-size: 0.75rem; margin-right: 4px; cursor: help; }

        /* Global Control Plane (Scrubber) */
        main.container { padding-bottom: 120px; }
        .global-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1a1d21; color: #fff; padding: 15px 0;
            border-top: 1px solid #333; z-index: 2000;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .footer-grid { display: grid; grid-template-columns: 200px 1fr 200px; gap: 20px; align-items: center; }
        .range-wrapper { position: relative; width: 100%; height: 30px; }
        .range-track { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .density-heatmap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6; }
        input[type="range"].dual-handle { position: absolute; width: 100%; pointer-events: none; appearance: none; background: none; margin: 0; top: 50%; transform: translateY(-50%); }
        input[type="range"].dual-handle::-webkit-slider-thumb { pointer-events: auto; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--pico-primary); cursor: pointer; border: 2px solid #fff; }
        .scrubber-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: #999; margin-top: 5px; font-family: monospace; }

        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } .footer-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body hx-ext="sse" sse-connect="/events/stream">
    <nav class="container">
        <ul>
            <li><strong><a href="/">Genesis Monitor</a></strong></li>
        </ul>
        <ul>
            <li><a href="/api/health">Health</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="global-footer">
        <div class="container footer-grid">
            <div class="version-info">
                <small><strong>Genesis Monitor</strong><br>v2.9.0 Hard SDLC</small>
            </div>
            
            <div class="scrubber-container">
                <div class="range-wrapper">
                    <div class="range-track">
                        <div class="density-heatmap" id="heatmap-gradient"></div>
                    </div>
                    <input type="range" id="range-start" class="dual-handle" min="0" max="100" value="0">
                    <input type="range" id="range-end" class="dual-handle" min="0" max="100" value="100">
                </div>
                <div class="scrubber-labels">
                    <span id="label-start">Start</span>
                    <span id="label-range">Full History</span>
                    <span id="label-end">Now</span>
                </div>
            </div>
            
            <div class="metrics-info" style="text-align: right;">
                <small id="event-count-display">0 Events</small><br>
                <small id="time-window-display">---</small>
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
