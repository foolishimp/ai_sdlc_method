description: >
  Design selector UI for the project detail dashboard. Allows users to filter all
  dashboard views to a single design tenant (imp_claude, imp_gemini, imp_codex, etc.)
  via a tab bar derived from the event log's .project field values. The HTMX
  configRequest interceptor and scrubber fix propagate the active filter automatically
  to all fragment requests without per-fragment URL changes.

