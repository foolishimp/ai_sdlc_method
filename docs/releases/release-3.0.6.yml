## Changelog

### Features
- REQ-F-PROXY-001: Human Proxy Mode — --human-proxy flag, proxy-log, actor attribution, rejection halt, session guard (UC-12 UAT converged)
- REQ-F-EVENT-001: Event Stream & Projections — append-only log, projection contract, event taxonomy, executor attribution, saga compensation (UC-13 UAT converged)
- feat(genesis_manager): EvidenceBrowser rework + REQ-F-FSNAV-001 design + supervision fixes

### Specification
- spec(adr-s-035): Genesis Topology Language (GTL) — Python library direction ACCEPTED, supersedes custom text DSL
- spec(gtl): GTL v0.2.1 — Package/Asset/Edge/Operator/Rule/Context/Overlay object model with constitutional invariants
  - Constitutional bindings: PackageSnapshot, context_snapshot_id, governing_snapshots[]
  - Compiler invariants enforced at construction (ValueError at import)
  - Typed Operative condition, Audit surfaces (topology vs traversal)
  - Two reference implementations: genesis_obligations + genesis_sdlc with 4 profiles
- spec(theory): Genesis monadic structure exploration — monoid, functor, state monad
- spec(invariant): intent→requirements as universally epistemically hard edge
- spec(strategy): Genesis as constitutional OS, enterprise architecture package
- spec(codex): genesis_obligations strategic session — entitlements, obligations

