## Changes since v3.0.4

### Specification
- ADR-S-039: Bug Triage and Post-Mortem Escalation (new)
  - Two-phase model: fix+log (reflex) → post-mortem triage (conscious)
  - bug_fixed event schema with provisional root_cause classification
  - Gradient test: coding_error → delta=0 discard; design_flaw → intent_raised escalate
- Bootloader §XX: calibration clause for bug handling (no vector required for fixes)
- Bootloader bumped to v3.0.1

### genesis_manager (first-party implementation)
- REQ-F-VIS-001: Professional dark theme — all 17 TSX components rethemed to semantic token system
- WorkspaceSidebar: 64px icon sidebar with active-state nav wired to all workspace pages
- genesis_manager v0.1.0 released (first tagged release of the React app)
- All 7 MVP features converged (PROJ, NAV, UX, OVR, SUP, EVI, CTL)

