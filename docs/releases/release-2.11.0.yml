  - Installer now deploys complete genesis package to target projects

### Spec: REQ-TOOL-016 rewrite
  - Workspace analysis reframed as a graph edge (not a reporting layer)
  - Grounded in iterate(Asset<workspace_state>, ...) — homeostatic loop closure

