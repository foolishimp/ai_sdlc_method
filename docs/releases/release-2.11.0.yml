## Summary

24 commits since v2.10.0. Three architectural pillars formalised as spec-level ADRs
(ADR-S-032/033/034). Autonomous dispatch engine (IntentObserver + EDGE_RUNNER) converged.
SCHEMA_DISCOVERY execution engine complete. Installer synced to 30-module manifest.
Graduated autonomy replaces Draft-Only Autonomy.

## Features

### New: ADR-S-032 — IntentObserver + EDGE_RUNNER Dispatch Contract
  - Stage 4 of ADR-S-008 pipeline: `intent_raised` → IntentObserver → EDGE_RUNNER
  - Graduated Autonomy: F_D + F_P execute autonomously; F_H gates remain human-controlled
  - `affected_features` as canonical dispatch field (feature = dispatch unit)
  - Brute-force traversal with `edge_started` deduplication guard
  - Cross-tenant ratified: Claude + Codex independent review

### New: ADR-S-033 — Genesis-Enabled Systems
  - Formalises two modes: "built with Genesis" vs "Genesis-enabled"
  - Bridge contract: REQ key thread (spec → code → telemetry → intent_raised → build graph)
  - Formal definition: 5 runtime criteria (REQ key threading, tolerances, event stream, intent gen, dispatch)
  - LIFE-001 formally motivated as homeostatic bridge contract
  - Two-sentence value proposition ratified

### New: ADR-S-034 — Genesis Ecosystem
  - Cooperative Genesis-enabled services co-evolving without central coordinator
  - Niche discovery through mutual intent observation (5-step process)
  - Two event stream layers: local (per-service) + ecosystem (cross-service)
  - REQ key as ecosystem identifier for capability publishing and dependency declaration
  - Three-sentence Genesis value proposition (ecosystem scale)

### New: REQ-F-DISPATCH-001 — Autonomous Dispatch Engine
  - intent_observer.py: find_unhandled_intents(), resolve_dispatch_targets(), get_pending_dispatches()
  - edge_runner.py: EdgeRunResult, run_edge() — F_D gate → F_P manifest → F_H escalation
  - dispatch_loop.py: run_dispatch_loop(), run_single_dispatch()
  - 55 unit tests (test_intent_observer.py: 33, test_edge_runner.py: 22)
  - F_H boundary respected: never autonomously resolves human gates

### New: REQ-F-SCHEMA-DISC-001 — SCHEMA_DISCOVERY Execution Engine
  - schema_discovery.py (~380 lines): notebook-driven schema inference
  - generate_exploration_notebook() → execute_notebook() → extract_schema_from_notebook()
  - 42 tests (test_schema_discovery.py, @pytest.mark.slow — requires nbconvert)
  - All-unique cardinality detection for ID-pattern columns

### New: Engine — IterationAbandoned OL event
  - Emitted when max_iterations_per_edge exhausted (Phase B stall)
  - Full OpenLineage envelope with causal runId threading

### New: Two-lane test certification (ADR-019 Codex review)
  - Lane 1: not e2e and not mcp (fast, deterministic)
  - Lane 2: e2e or mcp (slow, real integrations)
  - `mcp` marker added to pyproject.toml

## Fixes

### Installer sync — 30-module ENGINE_FILES manifest
  - Added 12 previously missing modules: consensus_engine, dispatch_loop, edge_runner,
    feature_parallelism, feature_view, human_audit, intent_observer, role_authority,
