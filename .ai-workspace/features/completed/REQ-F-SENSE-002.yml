description: |
  INTRO-008 (convergence_evidence_present) is implemented in workspace_integrity.py
  and callable via fd_sense.sense_convergence_evidence(), but two wiring gaps remain:

  Gap 1 — gen-start Step 10 health check does not invoke sense_convergence_evidence().
  Every gen-start invocation runs a quick health pass; INTRO-008 must be part of it.
  When breached, emit interoceptive_signal → affect triage → intent_raised (detection only).

  Gap 2 — No explicit repair affordance exists for convergence claims without stream evidence.
  Repair is a separate domain from detection: domain is (gap) → event_appended, not
  (feature, edge) → convergence. Repair lives behind an explicit invocation surface
  (gen-status --repair or equivalent) with an F_H gate and full provenance recording.
  EDGE_RUNNER is NOT used — routing repair through EDGE_RUNNER is a type error.

requirements:
  - REQ-SENSE-001
  - REQ-UX-005
  - REQ-EVENT-002

constraints:
  acceptance_criteria:
    - gen-start Step 10 invokes sense_convergence_evidence() on every health pass
    - When breached, gen-start emits interoceptive_signal{family:gap, contract:projection_authority}
    - interoceptive_signal passes through existing affect triage → intent_raised{signal_source:gap}
    - gen-status --health reports convergence_evidence_present failure without mutating state
    - gen-status --repair (or equivalent) presents an F_H gate listing gaps and requesting human confirmation
    - On confirmation, workspace_repair.repair_convergence_evidence() appends edge_converged{emission:retroactive} with explicit provenance per gap
    - After repair, re-running gen-start health pass returns breached=False
    - No new routing fields in intent_raised (no affected_edges, no gap_type — no material routing distinction)
    - No changes to dispatch_monitor.py, edge_runner.py, or intent_observer.py
    - Tests cover: health pass fires INTRO-008, repair path closes gaps, F_H gate blocks without confirmation, provenance fields present in emitted events

