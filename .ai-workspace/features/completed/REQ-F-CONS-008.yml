    result: 'feature closed with convergence_type: consensus_failed — no new review
      opened'
  - id: CONS-008-C4
    condition: recovery_path_selected invoked on open session (no consensus_failed)
    result: exits with error — recovery paths only valid after consensus_failed
  - id: CONS-008-C5
    condition: N re_open cycles without new artifact version or roster change
    result: 'homeostasis monitor detects stuck-delta pattern — intent_raised with
      signal_source: stuck emitted'
