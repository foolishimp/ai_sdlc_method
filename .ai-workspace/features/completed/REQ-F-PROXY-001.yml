created: '2026-03-13T03:20:00Z'
feature: REQ-F-PROXY-001
intent: INT-AISDLC-001
title: Human Proxy Mode for Autonomous Overnight Runs
parent_id: REQ-F-DISPATCH-001
priority: high
profile: standard
status: converged
vector_type: feature
notes: 'Observed gap during genesis_manager first boot: /gen-start --auto pauses at
  every

  required: true F_H gate, making overnight unattended runs stop at the first human

  approval checkpoint.


  The fix is --human-proxy mode: the LLM acts as an authorized human proxy at F_H
  gates,

  evaluating artifacts against F_H criteria and recording decisions with reasoning
  rather

  than pausing. All proxy decisions are logged to .ai-workspace/reviews/proxy-log/
  for

  morning human review and potential override.

  '
constraints:
  acceptance_criteria:
  - 'REQ-F-HPRX-001: --human-proxy flag requires --auto; used alone produces error
    ''--human-proxy requires --auto'''
  - 'REQ-F-HPRX-002: proxy evaluates all required F_H criteria per gate; overall decision
    approved iff all pass'
  - 'REQ-F-HPRX-003: proxy-log file written at .ai-workspace/reviews/proxy-log/{ISO}_{feature}_{edge}.md
    before review_approved event'
  - 'REQ-F-HPRX-004: review_approved event has actor field = ''human-proxy'' (never
    ''human'', never absent)'
  - 'REQ-F-HPRX-005: proxy rejection pauses auto-loop; proxy may not re-invoke iterate
    on rejected edge in same session'
  - 'REQ-BR-HPRX-002: --human-proxy is never activated by config, env var, or inference;
    explicit flag only'
