description: |
  Runtime robustness for the engine's F_P invocations.
  Trigger: 5-hour hang during test10 dogfood — claude -p subprocess became a
  zombie, blocking the engine with no timeout recovery or failure events.

  Scope: Process isolation, watchdog timeouts, failure event emission, and
  session gap detection.

  Design pivot (ADR-024, 2026-03-05): The subprocess path (fp_subprocess.py,
  fp_construct.py, fp_evaluate.py) was deleted and replaced by the MCP actor
  path (fp_functor.py + FpFunctor). The robustness requirements (timeout,
  isolation, failure events) are now satisfied by the MCP actor contract:
  _mcp_invoke() returns skipped=True when MCP is unavailable, and the actor
  writes a fold-back result file that the engine reads. The supervisor pattern
  (REQ-ROBUST-002) is now the actor's own timeout budget. Session gap detection
  (REQ-ROBUST-003/008) remains in workspace_state.py and is unaffected by the
  pivot. All requirements are satisfied by the new architecture.

requirements:
  - REQ-ROBUST-001  # F_P invocation isolation — satisfied by MCP actor boundary
  - REQ-ROBUST-002  # Supervisor pattern — satisfied by actor budget enforcement
  - REQ-ROBUST-003  # Crash recovery via event log gap detection
  - REQ-ROBUST-007  # Failure event emission
  - REQ-ROBUST-008  # Session gap detection
  - REQ-SUPV-003    # Failure observability

