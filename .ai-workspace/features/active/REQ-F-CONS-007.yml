evaluator_contracts:
  module: imp_claude/code/.claude-plugin/plugins/genesis/agents/gen-quorum-observer.md
  note: gen-quorum-observer to be created — REQ-F-CONS-007 implementation
  contracts:
  - id: CONS-007-C1
    trigger: vote_cast event for open review_id
    condition: evaluate_quorum returns converged=True
    emits: 'consensus_reached with schema: event_type, review_id, timestamp, project,
      data.{artifact, asset_version, quorum_threshold, roster_size, approve_votes,
      reject_votes, abstain_votes, non_response_count, approve_ratio, participation_ratio,
      gating_comments_total, gating_comments_dispositioned}'
  - id: CONS-007-C2
    trigger: vote_cast event for open review_id
    condition: evaluate_quorum returns converged=False AND now < review_closes_at
    emits: nothing — waits for next vote_cast
  - id: CONS-007-C3
    trigger: vote_cast event for open review_id
    condition: evaluate_quorum returns converged=False AND now >= review_closes_at
    emits: 'consensus_failed with schema: event_type, review_id, timestamp, project,
      data.{failure_reason, roster_size, approve_votes, reject_votes, abstain_votes,
      non_response_count, approve_ratio, participation_ratio, gating_comments_undispositioned,
      available_paths}'
  - id: CONS-007-C4
    trigger: vote_cast for review_id that already has consensus_reached or consensus_failed
    result: quorum observer ignores — circuit-breaker exits
  - id: CONS-007-C5
    condition: available_paths in consensus_failed
    values:
      QUORUM_NOT_REACHED: '[re_open, narrow_scope, abandon]'
      TIE: '[re_open, narrow_scope, abandon]'
      PARTICIPATION_FLOOR_NOT_MET: '[re_open, abandon]'
      GATING_COMMENTS_UNDISPOSITIONED: '[disposition_comments]'
