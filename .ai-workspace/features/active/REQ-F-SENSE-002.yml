constraints:
  acceptance_criteria:
    - gen-start Step 10 invokes sense_convergence_evidence() on every health pass
    - When breached, gen-start emits interoceptive_signal (not intent_raised directly — Option A)
    - EDGE_RUNNER has a handler for intent_type: convergence_without_evidence
    - Handler presents F_H gate: lists gaps, asks human to confirm retroactive repair
    - On confirmation, appends edge_converged{emission: retroactive} per gap
    - After repair, re-running gen-start health pass returns breached=False
    - Tests cover: health pass fires INTRO-008, repair path closes gaps, F_H gate blocks without confirmation

