description: |
  INTRO-008 (convergence_evidence_present) is implemented in workspace_integrity.py
  and callable via fd_sense.sense_convergence_evidence(), but two wiring gaps remain:

  Gap 1 — gen-start Step 10 health check does not invoke sense_convergence_evidence().
  Every gen-start invocation runs a quick health pass; INTRO-008 must be part of it.
  When breached, emit interoceptive_signal → affect triage → intent_raised per Option A.

  Gap 2 — EDGE_RUNNER has no handler for convergence_without_evidence intents.
  The dispatch_monitor (gen-start --auto Step 9) picks up intent_raised events and
  routes via EDGE_RUNNER. A convergence_without_evidence intent does not map to a
  feature graph edge; it maps to a retroactive repair action. EDGE_RUNNER needs a
  handler that surfaces the gaps and presents an F_H gate for human confirmation
  before appending edge_converged{emission: retroactive} events.

