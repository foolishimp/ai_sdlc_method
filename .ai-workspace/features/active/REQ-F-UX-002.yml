description: |
  Users currently must know command names (/gen-start, /gen-gaps, /gen-status --health)
  and their flags to invoke methodology operations. The adventure-game UX model: the
  user types natural language and the LLM routes to the correct F_D process chain.

  The LLM (Claude) acts as the NLP routing layer. Common intent patterns are pre-mapped
  to methodology operations. Ambiguous inputs prompt for clarification with a minimal
  question. The routing itself is logged as an intent_routed event for observability.
  Methodology operations are unchanged — only the invocation mechanism is abstracted.

  This is the difference between "go to the cave" (natural language) and knowing to
  type NORTH, TAKE TORCH, OPEN DOOR (command vocabulary).

requirements:
  - REQ-UX-008
