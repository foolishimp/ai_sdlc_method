  - REQ-UX-002

constraints:
  acceptance_criteria:
    - "what's broken" / "health check" routes to gen-status --health
    - "fix it" / "start" / "continue" routes to gen-start --auto
    - "find gaps" / "coverage" routes to gen-gaps
    - "where am I" / "status" routes to gen-status
    - "new feature X" / "add X" routes to gen-spawn --type feature
    - "release" routes to gen-release
    - Ambiguous inputs prompt for clarification — single minimal question
    - Routing is deterministic for unambiguous intents
    - Routing emits intent_routed event to events.jsonl
    - Routing layer is itself observable (no silent dispatch)

