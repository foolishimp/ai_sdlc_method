description: |
  The imp_claude dispatch path buries infrastructure failure inside domain-shaped
  return values, making it impossible to distinguish evaluator failure from genuine
  feature work remaining. This is the primary architectural debt identified in the
  Codex functional kernel review (20260313T000008).

  Seven specific gaps (priced in 20260313T020000 response):

  Gap 1 (HIGH) — Exception → delta collapse:
    _run_fd_evaluation() and the event/YAML loaders in edge_runner.py, intent_observer.py,
    workspace_integrity.py, workspace_state.py catch all exceptions as delta=1.
    "Evaluator broken" and "feature needs work" are semantically different states.
    EdgeRunResult needs an explicit evaluator_error field.

  Gap 2 (HIGH) — F_P sum type:
    FpFunctor.invoke() returns a skipped sentinel, throws FpActorResultMissing, or
    returns a result dict — three different channels for one decision.
    Needs: FpSkipped | FpPending(manifest) | FpReturned(result) | FpFailed(error)

  Gap 3 (MEDIUM) — Dual F_H encoding:
    run_edge() emits IterationCompleted with intent-style human_gate payload AND
    then emits intent_raised — same transition under two event kinds.
    IterationCompleted should be a pure observation record; intent_raised is authoritative.

  Gap 4 (MEDIUM) — Intent deduplication loses provenance:
    get_pending_dispatches() deduplicates by (feature_id, edge), letting first intent win.
    DispatchTarget should retain all contributing intent_ids (intent_events: list[dict])
    so the dispatched edge_started event records full provenance.

  Gap 5 (LOW/trivial) — Quiescence derivation:
    dispatch_loop reports quiescent=False unless something converged in this run.
    Quiescence is a workspace property: len(get_pending_dispatches()) == 0.

  Gap 6 (MEDIUM) — Untyped dict boundary:
    intent_observer.py passes raw event dicts through the dispatch path.
    Project into immutable IntentEvent at intake boundary.

  Gap 7 (DEFERRED) — dispatch_monitor mtime:
    Filesystem mtime/size triggering is fragile. Cursor-based replay is correct.
    Deferred to daemon mode work.

requirements:
  - REQ-SUPV-003

constraints:
  acceptance_criteria:
    - EdgeRunResult has evaluator_error field; _run_fd_evaluation exception paths set it, not delta
    - FdError path emits IterationCompleted{status:evaluator_error,delta:None} for replay visibility
    - FpOutcome = FpSkipped | FpPending | FpReturned | FpFailed; invoke() returns FpOutcome
    - run_edge() pattern-matches FpOutcome; no exception handling in dispatch path
    - IterationCompleted carries only iteration data (delta, evaluators, cost); no routing directives
    - intent_raised is the sole authoritative signal for F_H gate transitions
    - DispatchTarget.intent_events: list[dict] retains all contributing intents per (feature, edge)
    - edge_started carries handled_intent_ids list; _get_dispatched_intent_ids reads list (idempotency closure)
    - dispatch_loop quiescence = _compute_quiescence() — no pending + no parked fp_dispatched + no unresolved fh
    - All existing dispatch + edge_runner tests continue to pass
    - New tests cover: evaluator_error vs delta distinction, FpOutcome branches, single F_H event, multi-intent idempotency, quiescence states

