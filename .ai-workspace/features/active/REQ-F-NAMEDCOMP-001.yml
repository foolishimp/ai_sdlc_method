feature: REQ-F-NAMEDCOMP-001
title: "Named Composition Library and Intent Vector Envelope"
intent: "INT-NAMEDCOMP-001"
vector_type: feature
profile: standard
status: in_progress

description: |
  Implement the five-level compositional stack and intent vector envelope
  specified in ADR-S-026. Covers: named composition registry (PLAN, POC,
  SCHEMA_DISCOVERY, DATA_DISCOVERY), typed gap.intent output (composition
  expressions replacing free text), intent vector schema extension (extended
  tuple with source_kind, trigger_event, target_asset_type, produced_asset_ref,
  disposition), project convergence vocabulary (quiescent/converged/bounded),
  and the shared PLAN edge parameter template.

