evaluator_contracts:
  module: all CONSENSUS components
  note: Cross-cutting event emission contract — verified across all components
  contracts:
  - id: CONS-009-C1
    condition: any CONSENSUS event emitted
    required_fields: '[event_type, review_id, timestamp, project, actor]'
    result: event is valid JSON, appended to .ai-workspace/events/events.jsonl
  - id: CONS-009-C2
    condition: event_type field
    valid_values: '[consensus_requested, comment_received, vote_cast, asset_version_published,
      consensus_reached, consensus_failed, recovery_path_selected]'
    invalid_values: '[proposal_published, asset_version_changed]'
    note: canonical names enforced — deprecated names rejected
  - id: CONS-009-C3
    condition: events.jsonl
    result: append-only — no event line is modified or deleted after writing
  - id: CONS-009-C4
    condition: session rehydration
    invariant: project_review_state(all_events, review_id, close_time) produces identical
      votes and comments regardless of how many times called with the same inputs
  - id: CONS-009-C5
    condition: event sequence for a review_id
    invariant: consensus_reached or consensus_failed appears at most once per review_id
      — terminal events are idempotent
